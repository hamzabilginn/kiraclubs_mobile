name: iOS App Store Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: macos-13

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.x'
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Setup App Store Connect API Key
        env:
          APPSTORE_P8_KEY: ${{ secrets.APPSTORE_P8_KEY }}
          KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys/
          echo "$APPSTORE_P8_KEY" > ~/.appstoreconnect/private_keys/AuthKey_$KEY_ID.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_$KEY_ID.p8

      - name: Build and Export IPA
        run: |
          flutter build ipa --release --export-options-plist=ios/ExportOptions.plist

      - name: Upload to App Store Connect / TestFlight
        env:
          KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
        run: |
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" -print -quit)
          echo "Uploading $IPA_PATH to App Store Connect"
          xcrun altool --upload-app --type ios \
            -f "$IPA_PATH" \
            --apiKey "$KEY_ID" \
            --apiIssuer "$ISSUER_ID"
