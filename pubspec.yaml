name: kiraclubs
description: "KiraClubs - Sosyal Canlı Yayın Uygulaması"
publish_to: 'none'
version: 1.0.0+9

environment:
  sdk: '>=3.11.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.2

  # HTTP Client
  dio: ^5.7.0

  # Local Storage
  shared_preferences: ^2.3.2

  # Image Handling
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # Audio Playing & Recording
  audioplayers: ^6.0.0
  record: ^6.2.1
  path_provider: ^2.1.3

  # Permissions
  permission_handler: ^11.3.1

  # URL Launcher
  url_launcher: ^6.3.0

  # Font Awesome icons
  font_awesome_flutter: ^10.8.0

  # Shimmer loading
  shimmer: ^3.0.0

  # Video player
  video_player: ^2.9.3

  # Intl (date formatting)
  intl: ^0.20.2

  # Lottie animations
  lottie: ^3.3.1

  # WebSockets

  # Video/Voice Rooms (Agora)
  agora_rtc_engine: ^6.3.2

  # In-App Purchase
  in_app_purchase: ^3.2.0
  dart_pusher_channels: ^1.3.1
  onesignal_flutter: ^5.2.4
  app_links: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#0C0A10"
  adaptive_icon_foreground: "assets/images/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
