name: kiraclubs
description: "KiraClubs - Sosyal Canlı Yayın Uygulaması"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.11.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.2

  # HTTP Client
  dio: ^5.7.0

  # Local Storage
  shared_preferences: ^2.3.2

  # Image Handling
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # Permissions
  permission_handler: ^11.3.1

  # URL Launcher
  url_launcher: ^6.3.0

  # Font Awesome icons
  font_awesome_flutter: ^10.8.0

  # Shimmer loading
  shimmer: ^3.0.0

  # Video player
  video_player: ^2.9.3

  # Intl (date formatting)
  intl: ^0.20.2

  # Lottie animations
  lottie: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
